name: CI Pipeline

# Triggers on push and pull requests
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: team4you_test
          POSTGRES_USER: team4you
          POSTGRES_PASSWORD: team4you
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U team4you -d team4you_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # Checks out the repository code
      - uses: actions/checkout@v6.0.2

      # Sets up Java25 and caches Maven dependencies
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      # Ensure Maven wrapper is executable (Git may not preserve permissions)
      - name: Make mvnw executable
        run: chmod +x mvnw

      # Builds the project and runs all tests
      - name: Build and test
        run: ./mvnw verify
        env:
          DB_URL: jdbc:postgresql://localhost:5432/team4you_test
          DB_USERNAME: team4you
          DB_PASSWORD: team4you
          SPRING_DOCKER_COMPOSE_ENABLED: false
