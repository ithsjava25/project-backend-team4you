services:
  postgres:
    image: postgres:16
    container_name: team4you-postgres
    environment:
      POSTGRES_DB: team4you
      POSTGRES_USER: team4you
      POSTGRES_PASSWORD: team4you
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: