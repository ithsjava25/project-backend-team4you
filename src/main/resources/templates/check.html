<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Identity Verification</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <h2>Identity Verification</h2>
            <p class="text-muted">Please click the button below to authenticate using your security key or biometrics.</p>

            <button id="authenticate-button" class="btn btn-primary btn-lg mt-3">
                Authenticate with WebAuthn
            </button>

            <div id="error-message" class="alert alert-danger mt-4 d-none text-start"></div>
        </div>
    </div>
</div>

<script type="module">
    import webauthn from '/js/webauthn-core.js';

    document.addEventListener('DOMContentLoaded', () => {
        const authButton = document.getElementById('authenticate-button');
        const errorDiv = document.getElementById('error-message');

        if (authButton) {
            authButton.addEventListener('click', async () => {
                errorDiv.classList.add('d-none');

                const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

                const headers = {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                };

                if (csrfHeader && csrfToken) {
                    headers[csrfHeader] = csrfToken;
                }

                try {
                    await webauthn.authenticate(headers, '', false);
                    window.location.href = "/dashboard";
                } catch (error) {
                    console.error("Authentication Error:", error);
                    errorDiv.textContent = "Authentication failed: " + error.message;
                    errorDiv.classList.remove('d-none');
                }
            });
        }
    });
</script>
</body>
</html>
