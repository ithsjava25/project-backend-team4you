            <div class="logo">
                <a th:href="@{/}">Hem</a>
            </div>

            <div class="search-container">

                    <input type="text" name="query" placeholder="Sök ärende eller info...">

                </form>
            </div>

            <ul class="nav-links">
                <li><a th:href="@{/}" class="nav-menu">Home</a></li>

                <li class="nav-buttons">
                    <a th:href="@{/login}" class="btn-login">Sign in</a>

                </li>
            </ul>

        </div>
