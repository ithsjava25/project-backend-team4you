<header th:fragment="header" xmlns:sec="http://www.w3.org/1999/xhtml">
    <nav class="navbar">
        <div class="navdiv">

            <div class="logo">
                <a th:href="@{/}">Hem</a>
            </div>

            <div id="content-area"></div>

            <div class="search-container">
                <form
                        hx-get="/search"
                        hx-target="#content-area"
                        hx-swap="innerHTML"
                >
                    <input
                            type="text"
                            name="searchTerm"
                            placeholder="Sök..."
                            hx-trigger="keyup changed delay:300ms"
                    >

                    <button type="submit">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
            </div>

            <ul class="nav-links">
                <li class="nav-buttons"><a th:href="@{/}" class="nav-menu">Home</a></li>

                <li>
                    <a th:href="@{/contact}" class="nav-menu">Contact
                    </a>
                </li>

                <li sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}">Logga in</a>
                </li>

                <li sec:authorize="isAnonymous()">
                    <a th:href="@{/register}" class="btn-register">Register</a>
                </li>
                <li sec:authorize="hasRole('ADMIN')" class="nav-buttons">
                    <a th:href="@{/admin}" class="nav-menu">Admin</a>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post">
                        <button>Logga ut</button>
                    </form>
                </li>

            </ul>

        </div>
    </nav>
</header>
