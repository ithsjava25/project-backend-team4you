<div th:fragment="content">

    <h2>Ändra lösenord</h2>

    <form hx-post="/profile/change-password"
          hx-target="#content-area"
          hx-swap="innerHTML">

        <input type="password" name="oldPassword" placeholder="Nuvarande lösenord" required>

        <input type="password" name="newPassword" placeholder="Nytt lösenord" required>

        <button type="submit">Uppdatera</button>

    </form>

    <div th:if="${success}">
        <p style="color:green;">Lösenord uppdaterat!</p>
    </div>

    <div th:if="${success == false}">
        <p style="color:red;">Fel lösenord</p>
    </div>

</div>
