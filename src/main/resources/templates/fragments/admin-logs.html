<div th:fragment="content">
    <h2>Systemlogg</h2>

    <ul>
        <li th:each="log : ${logs}" th:text="${log}"></li>
    </ul>

    <button
            hx-get="/admin/logs?page=2"
            hx-target="#logs-container"
            hx-swap="beforeend"
    >
        Ladda fler
    </button>
    <button
            class="btn btn-danger"
            hx-delete="/admin/users/123"
            hx-confirm="Är du säker?"
            hx-target="closest tr"
            hx-swap="outerHTML"
    >
        Ta bort
    </button>
</div>
