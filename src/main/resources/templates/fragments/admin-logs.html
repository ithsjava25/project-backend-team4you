<div th:fragment="content">

    <h2>Systemlogg</h2>

    <ul>
        <li th:each="log : ${logs}">

            <strong th:text="${log.action}"></strong>
            - <span th:text="${log.performedBy}"></span>
            - <span th:text="${log.details}"></span>
            - <small th:text="${log.createdAt}"></small>

        </li>
    </ul>

    <div th:replace="~{fragments/pagination :: pagination('/admin/logs')}"></div>

</div>
