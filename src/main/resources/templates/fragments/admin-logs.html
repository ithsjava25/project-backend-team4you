

<div th:fragment="content">
    <style>


        .audit-table{
            background-color:
                    #161a2d;
            width:100%;
            border-collapse: collapse;
            color:white;
        }


        td{
            padding:25px;
        }

        span{
            font-size: 14px;
            margin:20px;
        }

        th{
            margin:20px;
            padding:10px;
            font-size:14px;
        }
        .btn-secondary {
            padding: 12px;
            background: black;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }


    </style>
    <button class="btn-secondary"
            hx-post="/admin/logs/cleanup?days=30"
            hx-target="#content-area"
            hx-confirm="Är du säker på att du vill radera loggar äldre än 30 dagar?">
        Rensa äldre än 30 dagar
    </button>
    <div class="log-actions" style="margin-bottom: 20px; display: flex; gap: 10px;">
<table class="audit-table">
    <thead>
    <tr>
        <th>Tid</th>
        <th>Användare</th>
        <th>Metod</th> <th>Handling</th>
        <th>Entitet</th>
        <th>Detaljer</th> <th>IP</th> <th>Status</th>
    </tr>




    </thead>
    <tbody>

    <tr th:each="log : ${logs}">

        <td th:text="${log.timestamp != null ? #temporals.format(log.timestamp, 'yyyy-MM-dd HH:mm') : 'N/A'}"></td>
        <td th:text="${log.username}"></td>
        <td><span class="method-tag" th:text="${log.httpMethod}"></span></td>
        <td><span class="badge" th:text="${log.action}"></span></td>
        <td th:text="${log.entityType}"></td>
        <td th:text="${log.details}">
            <span th:if="${log.details != null}" th:text="${log.details}"></span>
        </td>
        <td th:text="${log.ipAddress}" ></td>
        <td>
                <span th:class="${log.status == 'SUCCESS' ? 'status-ok' : 'status-fail'}"
                      th:text="${log.status}"></span>
        </td>
    </tr>
    </tbody>


</table>
    </div>
</div>
