

<div th:fragment="content">
    <style>

        .audit-table{
            background-color:
                    #161a2d;
            width:100%;
            border-collapse: collapse;
            color:white;
            table-layout: auto;
        }

        .audit-table th,
        .audit-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #2d3748;
        }


        .method-tag {
            background-color: #2d3748;
            color: #a0aec0;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
        }

        .badge {
            background-color: #4a5568;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
        }

        .status-ok {
            color: #48bb78;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(72, 187, 120, 0.2);
        }

        .status-fail {
            color: #f56565;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(245, 101, 101, 0.2);
        }

    </style>
    <button class="btn-secondary"
            hx-post="/admin/logs/cleanup?days=30"
            th:hx-headers="${_csrf != null} ? '{&quot;' + ${_csrf.headerName} + '&quot;:&quot;' + ${_csrf.token} + '&quot;}' : null"
            hx-target="#content-area"
            hx-confirm="Är du säker på att du vill radera loggar äldre än 30 dagar?">
    <div class="log-actions" style="margin-bottom: 20px; display: flex; gap: 10px;">
<table class="audit-table">
    <thead>
    <tr>
        <th>Tid</th>
        <th>Användare</th>
        <th>Metod</th> <th>Handling</th>
        <th>Entitet</th>
        <th>Detaljer</th> <th>IP</th> <th>Status</th>
    </tr>




    </thead>
    <tbody>

    <tr th:each="log : ${logs}">

        <td th:text="${log.timestamp != null ? #temporals.format(log.timestamp, 'yyyy-MM-dd HH:mm') : 'N/A'}"></td>
        <td th:text="${log.username}"></td>
        <td><span class="method-tag" th:text="${log.httpMethod}"></span></td>
        <td><span class="badge" th:text="${log.action}"></span></td>
        <td th:text="${log.entityType}"></td>
        <td th:text="${log.details}">
            <span th:if="${log.details != null}" th:text="${log.details}"></span>
        </td>
        <td th:text="${log.ipAddress}" ></td>
        <td>
                <span th:class="${log.status == 'SUCCESS' ? 'status-ok' : 'status-fail'}"
                      th:text="${log.status}"></span>
        </td>
    </tr>
    </tbody>


</table>
    </div>
</div>
