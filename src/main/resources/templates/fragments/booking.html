<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
    <head>
    <title>Ansökningar</title>
    <link th:href="@{/css/booking.css}" rel="stylesheet">
        <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    </head>
<body>

<section layout:fragment="content">

    <main class="card">
        <h2><i class="fa-regular fa-calendar"></i> Boka tid </h2>

        <section class="section-booking">
            <a
                    hx-get="/booking/application"
                    hx-target="#content-area"
                    hx-swap="innerHTML"
                    th:href="@{/booking/application}"
                    class="btn-highlight"
            >
                Ärende
            </a>

            <h2>Boka tid till ditt medborgarskapsärende</h2>
            <p>Välj det här alternativet om du har blivit ombedd att boka tid för personlig inställelse</p>
        </section>
        <section class="section-calling">
            <a
                    hx-get="/booking/search"
                    hx-target="#content-area"
                    hx-swap="innerHTML"
                    th:href="@{/booking/search}"
            >
                <h2>Sök uppmaning till bokning</h2>
                <p>Har du fått ett brev med en uppmaning att boka en tid? Sök</p>
            </a>
        </section>
        <div th:fragment="content">
            <h2>Bokning</h2>
        </div>
    </main>
</section>

</body>
</html>
