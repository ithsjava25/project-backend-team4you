<!DOCTYPE html>
<html lang="en">
<head>
    <title>Add New Book</title>
    <link th:href="@{/css/contact.css}" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
<div class="contact-wrapper"> <h1>Contact Us</h1>
    <div th:replace="fragments/form-errors :: errors"></div>
    <form hx-post="/contact/send"
          hx-target="#contact-section"
          hx-swap="outerHTML"
          th:object="${contactForm}">

        <input type="text" th:field="*{firstName}">

        <button type="submit">Skicka meddelande</button>
        <div class="container">
            <div th:fragment="message">
                <p>Tack! Meddelandet är skickat 🎉</p>
            </div>
            <div>
                <label class="form-label">First Name </label>
                <input type="text" class="form-control" th:field="*{firstName}" placeholder="Name" required>
            </div>
            <div>
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" th:field="*{lastName}" placeholder="Last name" required>
            </div>
            <div>
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}" placeholder="Email" required>

            </div>
            <div>
                <label class="form-label">Phone number</label>
                <input type="text" class="form-control" th:field="*{phone}" placeholder="Phone number" required>
            </div>
            <div>
                <label class="form-label">Message</label>
                <textarea class="form-control" th:field="*{message}" placeholder="How can we help?" required></textarea>
            </div>
            <div>
                <button
                        type="submit" class="submit-btn">Send Message</button>
            </div>
        </div>
    </form>
</div>
</body>
</html>
