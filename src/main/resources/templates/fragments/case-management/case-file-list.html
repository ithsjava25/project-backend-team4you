<div th:fragment="caseFileList" class="case-file-panel">

    <h3>Filer</h3>

    <p th:if="${successMessage}"
       th:text="${successMessage}"
       class="feedback-message success-message"></p>

    <p th:if="${errorMessage}"
       th:text="${errorMessage}"
       class="feedback-message error-message"></p>

    <form th:action="@{/dashboard/case-management/case-records/{caseId}/files(caseId=${caseRecordId})}"
          th:attr="hx-post=@{/dashboard/case-management/case-records/{caseId}/files(caseId=${caseRecordId})}"
          method="post"
          enctype="multipart/form-data"
          hx-encoding="multipart/form-data"
          hx-target="closest .case-file-panel"
          hx-swap="outerHTML">

        <div class="form-group">
            <label for="case-file-upload">Ladda upp fil</label>
            <input id="case-file-upload" type="file" name="file" required>
        </div>

        <button type="submit">Ladda upp</button>
    </form>

    <ul class="case-file-list">
        <li th:if="${#lists.isEmpty(files)}">Inga filer uppladdade ännu.</li>

        <li th:each="file : ${files}">
            <span th:text="${file.originalFilename}">document.pdf</span>

            <a th:href="@{/api/cases/{caseId}/files/{fileId}(caseId=${caseRecordId}, fileId=${file.id})}">
                Ladda ner
            </a>

            <button type="button"
                    th:attr="hx-delete=@{/dashboard/case-management/case-records/{caseId}/files/{fileId}(caseId=${caseRecordId}, fileId=${file.id})}"
                    hx-target="closest .case-file-panel"
                    hx-swap="outerHTML">
                Ta bort
            </button>
        </li>
    </ul>
</div>
