<div th:fragment="caseFileList">
    <h3>Filer</h3>

    <ul class="case-file-list">
        <li th:each="file : ${files}">
            <span th:text="${file.originalFilename}">document.pdf</span>

            <a th:href="@{/api/cases/{caseId}/files/{fileId}(caseId=${caseRecordId}, fileId=${file.id})}">
                Ladda ner
            </a>

            <button th:attr="hx-delete=@{/dashboard/case-management/case-records/{caseId}/files/{fileId}(caseId=${caseRecordId}, fileId=${file.id})}"
                    hx-target="#case-file-panel"
                    hx-swap="innerHTML">
                Ta bort
            </button>
        </li>
    </ul>

    <form th:attr="hx-post=@{/dashboard/case-management/case-records/{caseId}/files(caseId=${caseRecordId})}"
          hx-encoding="multipart/form-data"
          hx-target="#case-file-panel"
          hx-swap="innerHTML">
        <div class="form-group">
            <label for="case-file-upload">Ladda upp fil</label>
            <input id="case-file-upload" type="file" name="file" required>
        </div>

        <button type="submit" class="btn-primary">Ladda upp</button>
    </form>
</div>
