<div th:fragment="registryList">
    <div class="registry-panel-content">
        <h2>Diarier</h2>

        <p th:if="${successMessage}"
           th:text="${successMessage}"
           class="feedback-message success-message"></p>

        <p th:if="${errorMessage}"
           th:text="${errorMessage}"
           class="feedback-message error-message"></p>

        <form class="registry-form"
              th:attr="hx-post=@{/dashboard/case-management/registries}"
              hx-target="#registry-panel"
              hx-swap="innerHTML">
            <div class="form-group">
                <label for="registry-name">namn</label>
                <input id="registry-name"
                       type="text"
                       name="name"
                       placeholder="t.ex. Kommunstyrelsen"
                       required>
            </div>

            <div class="form-group">
                <label for="registry-code">kod</label>
                <input id="registry-code"
                       type="text"
                       name="code"
                       placeholder="t.ex. KS"
                       maxlength="2"
                       required>
            </div>

            <button type="submit" class="btn-primary">skapa diarium</button>
        </form>

        <hr class="section-divider">

        <ul class="registry-list">
            <li th:if="${#lists.isEmpty(registries)}" class="empty-state">
                inga diarium ännu
            </li>

            <li th:each="registry : ${registries}">
                <button type="button"
                        class="registry-button"
                        th:attr="hx-get=@{/dashboard/case-management/registries/{id}/case-records(id=${registry.id})}"
                        hx-target="#case-record-panel"
                        hx-swap="innerHTML">
                    <span class="registry-name" th:text="${registry.name}">registry</span>
                    <span class="registry-code"
                          th:text="'(' + ${registry.code} + ')'">(RG)</span>
                </button>
            </li>
        </ul>
    </div>
</div>
