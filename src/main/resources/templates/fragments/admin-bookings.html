<div th:fragment="content">

    <h2>Bokningar</h2>

    <ul>
        <li th:each="booking : ${bookings}">
            <span th:text="${booking}"></span>

            <button
                    th:attr="hx-post=@{/admin/bookings(id=${booking})}"
                    hx-target="closest li"
                    hx-swap="outerHTML"
                    hx-confirm="Är du säker?">
                Ta bort
            </button>
        </li>
    </ul>

    <div th:replace="fragments/pagination :: pagination('/admin/users')"></div>
</div>
