<div th:fragment="content">
    <style>

    </style>

    <h2>Användare</h2>

    <div id="alert-area"></div>

    <ul>
        <li th:each="user : ${users}">

            <strong th:text="${user.displayName}"></strong>
            -
            <span th:text="${user.email}"></span>

            <form
                    th:action="@{/admin/users/{id}/role(id=${user.idAsString})}"
                    th:attr="hx-post=@{/admin/users/{id}/role(id=${user.idAsString})}"
                    hx-target="#content-area"
                    hx-swap="innerHTML"
            >

                <select class="admin-users-select" name="role">
                    <option value="USER">USER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>

                <button type="submit" class="btn-admin-users">
                    Uppdatera roll
                </button>

            </form>

        </li>
    </ul>

    <div th:replace="fragments/pagination :: pagination('/admin/users')">
    </div>

</div>
