    <h2>Användare</h2>

    <div id="alert-area"></div>

    <ul>
        <li th:each="user : ${users}">


            <button class="btn-admin-users">
                <a th:href="@{/admin/users/authorize/{id}(id=${user.id})}">Användare: <span th:text="${user.name}"></span>

            </button>
        </li>
    </ul>
    <div>
        <label>
            <select id="user-role-select">
            <option th:each="user : ${users}" VALUE="ADMIN">Ändra användare till admin</option>

            </select>
        </label>
    </div>

    <div th:replace="fragments/pagination :: pagination('/admin/users')"></div>
