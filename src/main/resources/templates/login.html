<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<div class="signup-box" xmlns:th="http://www.w3.org/1999/xhtml">
    <h1>Registrera dig</h1>
    <form th:action="@{/register}" method="post">
        <label for="firstName">Förnamn</label>
        <input type="text" id="firstName" name="firstName" required>

        <label for="lastName">Efternamn</label>
        <input type="text" id="lastName" name="lastName" required>

        <label for="email">E-post</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Mobilnummer</label>
        <input type="tel" id="phone" name="phoneNumber" placeholder="07x-xxx xx xx">

        <label for="password">Lösenord</label>
        <input type="password" id="password" name="password" required>

        <label for="confirmPassword">Bekräfta lösenord</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required>

        <input type="submit" value="Skapa konto" class="submit-btn">
    </form>

    <div class="footer-links">
        <p>Har du redan ett konto? <a th:href="@{/login}">Logga in</a></p>
        <p><a th:href="@{/}">Tillbaka till start</a></p>
    </div>
</div>
</body>
</html>
