<!doctype html>
<html lang="sv"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Logga in</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<section layout:fragment="content">

<body>


    <div class="login-wrapper">

    <div th:replace="fragments/form-errors :: errors"></div>
    <div th:replace="fragments/success-message :: success"></div>

    <div class="form-container">

        <h2>Logga in</h2>

        <form th:action="@{/login}" method="post">

            <label for="username">Användarnamn</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="password">Lösenord</label>
            <input type="password" id="password" name="password" required>

            <button class="login-submit" type="submit">Logga in</button>

        </form>

        <p>
            Har du inget konto?
            <a th:href="@{/register}">Registrera</a>
        </p>

        <button class="passkey-button"
                type="button"
                hx-get="/login/webauthn"
                hx-target="#content-area"
                hx-swap="innerHTML">
            Logga in med passkeys
        </button>

    </div>
    </div>
</section>

</body>
</html>
