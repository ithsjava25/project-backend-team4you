<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>

    <link th:href="@{/css/side-navbar.css}" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link th:href="@{/css/navbar.css}">
</head>
<body>
<aside th:fragment="aside">
    <div class="container">
        <div class="head">
            <a th:href="@{/}">Admin Dashboard!</a>
        </div>
        <ol class="side-nav">
            <li class="home">
                <a
                        hx-get="/admin/users"
                        hx-target="#content-area"
                >

                </a>
                    <i class="fa-solid fa-house"></i>
                    <span>Hantera användare</span>

            </li>
            <li class="application">
                <a
                        hx-get="/admin/applications"
                        hx-target="#content-area"
                        hx-swap="innerHTML"
                >

                </a>
                    <i class="fa-solid fa-file-invoice"></i>
                    <span>Hantera ansökningar</span>

            </li>
            <li class="booking">
                <a
                        hx-get="/admin/bookings"
                        hx-target="#content-area"
                        hx-swap="innerHTML"
                >
                    Bokningar
                </a>
                    <i class="fa-solid fa-calendar-days"></i>
                    <span>Hantera bokade tider</span>

            </li>
            <li> <a
                    hx-get="/profile"
                    hx-target="#profile-content"
                    hx-swap="innerHTML"
            ></a>
                <i class="fa-solid fa-user"></i>
                <span>Hantera profiler</span>
            </li>
            <li>
                <a
                hx-get="/admin/logs"
                hx-target="#content-area"
                hx-swap="innerHTML">
                    <i class="fa-solid fa-user"></i>
                    <span>Systemlogg</span>
                </a>
            </li>
            <form th:action="@{/logout}" method="post">
                <button type="submit">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logga ut</span>
                </button>
            </form>
            <div th:fragment="content">
                <h2>Systemlogg</h2>
                <ul>
                    <li th:each="log : ${logs}" th:text="${log}"></li>
                </ul>
            </div>
        </ol>
        <main id="content-area">
            <div id="profile-content">
                <p>Välj något i menyn</p>
            </div>
        </main>

    </div>
</aside>
</body>
</html>
