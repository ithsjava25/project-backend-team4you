<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" lang="">
<head>
    <meta charset="UTF-8">
    <title>navbar</title>
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<div class="signup-box" xmlns:th="http://www.w3.org/1999/xhtml">
    <h1>Registrera dig</h1>
    <form th:action="@{/register}" method="post">
        <label for="firstName">Förnamn </label>
        <input type="text" id="firstName" name="firstName" required>

        <label for="lastName">Efternamn </label>
        <input type="text" id="lastName" name="lastName" required>

        <label for="email">E-post</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Mobilnummer</label>
        <input type="tel" id="phone" name="phoneNumber" placeholder="07x-xxx xx xx">

        <label for="password">Lösenord</label>
        <input type="password" id="password" name="password" required>

        <label for="confirmPassword">Bekräfta lösenord</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required>

        <input type="submit" value="Skapa konto" class="submit-btn">
    </form>

    <div class="footer-links">
        <p>Har du redan ett konto? <a th:href="@{/login}">Logga in</a></p>
        <p><a th:href="@{/}">Tillbaka till start</a></p>
    </div>
</div>

</html>
