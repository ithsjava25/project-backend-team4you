<!DOCTYPE html>
<html lang="sv"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<body>

<section layout:fragment="content">

    <div class="login-wrapper">

        <div class="form-wrapper">

            <div th:replace="fragments/form-errors :: errors"></div>
            <div th:replace="fragments/success-message :: success"></div>

            <div class="form-container">

                <form th:action="@{/register}"
                      th:object="${user}"
                      method="post">


                    <h1 class="register-h1">Registrera dig</h1>
                    <div class="form-group">
                        <label>
                            Användarnamn
                            <input type="text" th:field="*{username}" required>
                        </label>

                        <input type="hidden" th:field="*{role}" value="ROLE_USER">

                        <label >Förnamn</label>
                        <input type="text" th:field="*{firstName}" required>
                    </div>
                    <div class="form-group">
                        <label >Efternamn</label>
                        <input type="text" th:field="*{lastName}" required>
                    </div>
                    <label >E-post</label>
                    <input type="email" th:field="*{email}" required>

                    <div class="form-group">
                        <label >Mobilnummer</label>

                        <input type="tel" th:field="*{phoneNumber}">
                    </div>

                    <label >Lösenord</label>

                    <input type="password" th:field="*{password}" required>
                    <div class="form-group">
                        <label >Bekräfta lösenord</label>
                        <input type="password" th:field="*{confirmPassword}" required>
                    </div>
                    <button type="submit" class="btn-primary">Skapa konto</button>

                </form>

                <div class="footer-links">
                    <p>Har du redan ett konto? <a th:href="@{/login}">Logga in</a></p>
                    <p><a th:href="@{/}">Tillbaka</a></p>
                </div>

            </div>
        </div>

    </div>

</section>

</body>
</html>
